<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blink Catch</title>
  <style>
    :root {
      --bg1: #0f1226;
      --bg2: #1b2044;
      --panel: rgba(15, 18, 38, 0.72);
      --panel-border: rgba(255, 255, 255, 0.10);
      --text: #f3f6ff;
      --muted: #aab2d5;
      --accent: #7cf7d4;
      --accent2: #7aa8ff;
      --danger: #ff7b93;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(122, 168, 255, 0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(124, 247, 212, 0.14), transparent 30%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      overflow: hidden;
    }
    .wrap {
      height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .game-shell {
      width: min(920px, 100%);
      height: min(680px, calc(100vh - 48px));
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      position: relative;
      z-index: 3;
    }
    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .brand h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 30px);
      letter-spacing: 0.02em;
    }
    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }
    .pill {
      min-width: 108px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .pill .label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 3px; }
    .pill .value { display: block; font-size: 20px; font-weight: 800; }

    .arena {
      position: absolute;
      inset: 92px 18px 18px 18px;
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 25%, rgba(122, 168, 255, 0.12), transparent 36%),
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.25;
      pointer-events: none;
    }
    .target {
      position: absolute;
      width: 84px;
      height: 84px;
      border: 0;
      border-radius: 50%;
      cursor: pointer;
      transform: translate(-50%, -50%) scale(1);
      background:
        radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95), rgba(255,255,255,0.35) 18%, rgba(124,247,212,0.94) 19%, rgba(122,168,255,0.95) 60%, rgba(122,168,255,0.24) 68%, rgba(255,255,255,0) 69%),
        radial-gradient(circle at 50% 50%, rgba(124,247,212,0.95), rgba(122,168,255,0.92));
      box-shadow:
        0 0 0 8px rgba(124,247,212,0.10),
        0 0 28px rgba(124,247,212,0.45),
        0 0 60px rgba(122,168,255,0.24);
      transition: transform 0.12s ease, width 0.12s ease, height 0.12s ease, opacity 0.2s ease;
      opacity: 0;
      pointer-events: none;
    }
    .target.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .target.hit {
      transform: translate(-50%, -50%) scale(0.75);
    }
    .target.tiny {
      width: 54px;
      height: 54px;
    }
    .target.warn {
      background:
        radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95), rgba(255,255,255,0.35) 18%, rgba(255,123,147,0.94) 19%, rgba(255, 181, 88, 0.95) 60%, rgba(255,123,147,0.20) 68%, rgba(255,255,255,0) 69%),
        radial-gradient(circle at 50% 50%, rgba(255,123,147,0.95), rgba(255,181,88,0.92));
      box-shadow:
        0 0 0 8px rgba(255,123,147,0.10),
        0 0 28px rgba(255,123,147,0.45),
        0 0 60px rgba(255,181,88,0.24);
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(10, 12, 24, 0.18), rgba(10, 12, 24, 0.56));
      padding: 24px;
      z-index: 4;
    }
    .card {
      width: min(520px, 100%);
      padding: 28px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      text-align: center;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 42px);
    }
    .card p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.55;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .btn {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 800;
      cursor: pointer;
      color: #08111c;
      background: linear-gradient(135deg, var(--accent), #ccffe9);
      box-shadow: 0 14px 32px rgba(124,247,212,0.18);
      transition: transform 0.12s ease, filter 0.12s ease;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.03); }
    .btn.secondary {
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: none;
    }
    .hint {
      position: absolute;
      left: 20px;
      bottom: 18px;
      z-index: 3;
      color: var(--muted);
      font-size: 13px;
      max-width: 70ch;
      user-select: none;
    }
    .toast {
      position: absolute;
      top: 92px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--text);
      background: rgba(15, 18, 38, 0.82);
      border: 1px solid rgba(255,255,255,0.10);
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .flash {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(124,247,212,0.16), transparent 40%);
      opacity: 0;
      transition: opacity 0.12s ease;
      pointer-events: none;
      z-index: 2;
    }
    .flash.on { opacity: 1; }
    @media (max-width: 640px) {
      .game-shell { height: calc(100vh - 20px); border-radius: 20px; }
      .arena { inset: 88px 12px 12px 12px; }
      .pill { min-width: 92px; }
      .hint { font-size: 12px; right: 14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="game-shell" aria-label="Blink Catch game">
      <header class="hud">
        <div class="brand">
          <h1>Blink Catch</h1>
          <p>작은 빛구슬을 따라다니며 30초를 버티는 아주 단순한 클릭 게임</p>
        </div>
        <div class="stats" aria-live="polite">
          <div class="pill"><span class="label">점수</span><span id="score" class="value">0</span></div>
          <div class="pill"><span class="label">남은 시간</span><span id="time" class="value">30.0</span></div>
          <div class="pill"><span class="label">최고 기록</span><span id="best" class="value">0</span></div>
        </div>
      </header>

      <section class="arena" id="arena">
        <div class="grid"></div>
        <div class="flash" id="flash"></div>
        <button id="target" class="target" aria-label="target"></button>
        <div class="toast" id="toast"></div>
        <div class="overlay" id="overlay">
          <div class="card">
            <h2>지금 시작할까요?</h2>
            <p>
              30초 동안 나타나는 구슬을 클릭하세요. 클릭할수록 구슬이 작아지고 더 빨리 도망갑니다.
              심심할 때 머리 비우기용으로 딱 맞는 초간단 게임입니다.
            </p>
            <div class="actions">
              <button class="btn" id="startBtn">게임 시작</button>
              <button class="btn secondary" id="resetBestBtn" title="저장된 최고 기록을 초기화">기록 초기화</button>
            </div>
          </div>
        </div>
      </section>

      <div class="hint">조작: 마우스로 클릭 / Enter로 시작 또는 재시작 / Esc로 일시정지</div>
    </main>
  </div>

  <script src="game.js"></script>
</body>
</html>
